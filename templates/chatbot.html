<!DOCTYPE html>
<html>

<head>

<title>AI Health Assistant</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:linear-gradient(135deg,#2A7FFF,#00C897);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* Navbar */

.navbar{
position:absolute;
top:0;
width:100%;
padding:20px 40px;
display:flex;
justify-content:space-between;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
color:white;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
}

/* Chat Container */

.chat-container{
background:white;
width:500px;
height:500px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
display:flex;
flex-direction:column;
overflow:hidden;
}

/* Header */

.chat-header{
background:#2A7FFF;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
}

/* Chat Messages */

#chatbox{
flex:1;
padding:15px;
overflow-y:auto;
background:#f4f7fb;
}

/* Message Bubbles */

.user-msg{
background:#2A7FFF;
color:white;
padding:10px;
border-radius:10px;
margin:5px 0;
text-align:right;
}

.bot-msg{
background:#e6e6e6;
padding:10px;
border-radius:10px;
margin:5px 0;
text-align:left;
}

/* Input Area */

.input-area{
display:flex;
padding:10px;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-left:10px;
padding:10px 15px;
border:none;
border-radius:8px;
background:#00C897;
color:white;
cursor:pointer;
}

button:hover{
background:#00a97d;
}

</style>

<script>

async function sendMessage(){

let message = document.getElementById("userInput").value

let response = await fetch("/get_response",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:message})
})

let data = await response.json()

let chatbox = document.getElementById("chatbox")

chatbox.innerHTML += "<div class='user-msg'>"+message+"</div>"
chatbox.innerHTML += "<div class='bot-msg'>"+data.response+"</div>"

document.getElementById("userInput").value=""

chatbox.scrollTop = chatbox.scrollHeight

}

</script>

</head>

<body>

<div class="navbar">

<h3>Smart AI Healthcare</h3>

<div>
<a href="/dashboard/{{username}}">Dashboard</a>
<a href="/logout">Logout</a>
</div>

</div>

<div class="chat-container">

<div class="chat-header">
AI Health Assistant
</div>

<div id="chatbox"></div>

<div class="input-area">

<input type="text" id="userInput" placeholder="Ask your health question...">

<button onclick="sendMessage()">Send</button>

</div>

</div>

</body>

</html>

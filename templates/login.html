<!DOCTYPE html>
<html>

<head>

<title>AI Smart Care - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(120deg,#2A7FFF,#00C897);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
margin:0;
}

/* Navbar */

.navbar{
position:absolute;
top:0;
width:100%;
padding:15px;
display:flex;
justify-content:center;
background:rgba(0,0,0,0.2);
}

.navbar a{
color:white;
text-decoration:none;
margin:0 20px;
font-weight:500;
}

/* Login Card */

.login-container{
background:white;
width:420px;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
animation:fadeIn 0.8s ease;
}

.login-container img{
width:90px;
margin-bottom:15px;
}

/* Inputs */

.input-group{
margin:15px 0;
}

.input-group i{
position:absolute;
margin:14px;
color:#888;
}

input{
width:100%;
padding:12px 12px 12px 40px;
border-radius:8px;
border:1px solid #ccc;
}

/* Button */

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#2A7FFF,#00C897);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

/* Animation */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="navbar">
<a href="/">Home</a>
<a href="/register">Register</a>
</div>


<div class="login-container">

<img src="https://cdn-icons-png.flaticon.com/512/2966/2966488.png">

<h3>AI Smart Care Login</h3>

<form action="/login_user" method="POST">

<div class="input-group">
<i class="fa fa-envelope"></i>
<input type="text" name="email" placeholder="Email" required>
</div>

<div class="input-group">
<i class="fa fa-lock"></i>
<input type="password" name="password" placeholder="Password" required>
</div>

<button type="submit">Login</button>

</form>

</div>

</body>

</html>

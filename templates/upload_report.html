<!DOCTYPE html>
<html>

<head>

<title>Upload Medical Report</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:linear-gradient(135deg,#2A7FFF,#00C897);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

/* Navbar */

.navbar{
position:absolute;
top:0;
width:100%;
padding:20px 40px;
display:flex;
justify-content:space-between;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
color:white;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
}

/* Card */

.card-box{
background:white;
border-radius:20px;
padding:40px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
animation:fadeIn 0.7s ease;
}

.card-box img{
width:80px;
margin-bottom:15px;
}

/* File Input */

input[type="file"]{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

/* Button */

button{
width:100%;
padding:12px;
margin-top:20px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#2A7FFF,#00C897);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* Animation */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="navbar">

<h3>Smart AI Healthcare</h3>

<div>
<a href="/dashboard/{{username}}">Dashboard</a>
<a href="/logout">Logout</a>
</div>

</div>


<div class="card-box">

<img src="https://cdn-icons-png.flaticon.com/512/3371/3371425.png">

<h3>Upload Medical Report</h3>

<p>User: {{username}}</p>

<form action="/save_report" method="POST" enctype="multipart/form-data">

<input type="hidden" name="user_name" value="{{username}}">

<label>Select Medical Report</label>

<input type="file" name="report" required>

<button type="submit">Upload Report</button>

</form>

</div>

</body>

</html>

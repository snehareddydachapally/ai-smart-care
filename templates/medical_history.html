<!DOCTYPE html>
<html>

<head>

<title>Medical History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:linear-gradient(135deg,#2A7FFF,#00C897);
min-height:100vh;
}

/* Navbar */

.navbar{
padding:20px 40px;
display:flex;
justify-content:space-between;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
color:white;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
}

/* Layout */

.main{
display:flex;
justify-content:center;
gap:40px;
padding:40px;
flex-wrap:wrap;
}

/* Card */

.card-box{
background:white;
border-radius:20px;
padding:30px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
animation:fadeIn 0.7s ease;
}

.card-box img{
width:70px;
margin-bottom:10px;
}

/* Inputs */

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

/* Button */

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(90deg,#2A7FFF,#00C897);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* History Table */

.history-box{
background:white;
border-radius:20px;
padding:30px;
width:600px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#2A7FFF;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f2f2f2;
}

/* Animation */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="navbar">

<h3>Smart AI Healthcare</h3>

<div>
<a href="/dashboard/{{username}}">Dashboard</a>
<a href="/logout">Logout</a>
</div>

</div>


<div class="main">

<!-- Add History Form -->

<div class="card-box">

<img src="https://cdn-icons-png.flaticon.com/512/3209/3209265.png">

<h3>Medical History - {{username}}</h3>

<form action="/save_history" method="POST">

<input type="hidden" name="user_name" value="{{username}}">

<label>Condition Name</label>
<input type="text" name="condition_name">

<label>Diagnosis Date</label>
<input type="date" name="diagnosis_date">

<label>Treatment</label>
<input type="text" name="treatment">

<label>Doctor Notes</label>
<input type="text" name="notes">

<button type="submit">Save History</button>

</form>

</div>


<!-- History Table -->

<div class="history-box">

<h3>Past Conditions</h3>

<table>

<tr>
<th>Condition</th>
<th>Date</th>
<th>Treatment</th>
<th>Notes</th>
</tr>

{% for h in history %}

<tr>
<td>{{h[2]}}</td>
<td>{{h[3]}}</td>
<td>{{h[4]}}</td>
<td>{{h[5]}}</td>
</tr>

{% endfor %}

</table>

</div>

</div>

</body>

</html>
